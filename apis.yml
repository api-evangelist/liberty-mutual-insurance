aid: liberty-mutual-insurance
name: Liberty Mutual Insurance
description: >-
  Liberty Mutual Insurance Group is one of the largest global property and
  casualty insurers, headquartered in Boston, Massachusetts. The company
  offers a wide range of insurance products and services, including personal
  automobile, homeowners, workers compensation, and commercial lines, and
  exposes API-based insurance solutions for partners across the insurance
  lifecycle from quote-and-purchase through policyholder service and claims.
