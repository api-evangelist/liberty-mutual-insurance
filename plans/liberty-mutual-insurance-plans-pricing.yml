        name: api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: Partner Onboarding
      - name: Producer Licensing Coordination
      - name: Liberty Mutual Renters Insurance API
      - name: Commercial / Claims Partner APIs
