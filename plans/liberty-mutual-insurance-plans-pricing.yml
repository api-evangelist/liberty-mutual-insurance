description: Liberty Mutual exposes insurance APIs (renters, auto, commercial, claims) through partner
  programs and approved third-party platforms (e.g. property-management software, agency platforms,
  bordereau partners). There is no public, self-serve API plans/pricing page; commercial terms are negotiated
  per partner relationship.
notes: No public pricing page found. Plan below is a placeholder for partner / approved integrator engagement;
  pricing and quotas must be confirmed with Liberty Mutual.
sources:
  - https://business.libertymutual.com
  - https://www.libertymutual.com
plans:
