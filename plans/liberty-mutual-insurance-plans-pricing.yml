    name: Partner / Approved Integrator
    type: enterprise
    description: API access for approved Liberty Mutual partners — property-management software, agency
      platforms, claims integrators, bordereau partners. Terms, commission flows, and quotas are negotiated
      under the partner agreement.
    entries:
