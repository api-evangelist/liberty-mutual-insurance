specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Liberty Mutual Insurance
providerId: liberty-mutual-insurance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Insurance
  - Casualty
  - Commercial Lines
  - Personal Lines
description: 'FOCUS-aligned FinOps scaffold for Liberty Mutual Insurance: partner-only API access with
  no public per-call pricing. Consumer-side telemetry tracks against the partner agreement (commission,
  premium, claims-handling), not metered API invoices.'
notes: Pricing is partner-contract driven. Meters describe the consumer-side observation surface.
sources:
  - https://business.libertymutual.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Liberty Mutual Insurance Company
serviceCategory: Insurance / API
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Liberty Mutual Insurance API
  ServiceCategory: Insurance / API
  ProviderName: Liberty Mutual Insurance
  PublisherName: Liberty Mutual Insurance Company
  InvoiceIssuerName: Liberty Mutual Insurance Company
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
      - partner
  - name: quotes_issued
    unit: quote
    aggregation: sum
    dimensions:
      - product
      - state
  - name: policies_bound
    unit: policy
    aggregation: sum
    dimensions:
      - product
      - state
principles:
  - name: Visibility
    description: Track quote, bind, and claim event volumes through your gateway / observability stack;
      Liberty Mutual does not expose a public usage API.
  - name: Allocation
    description: Tag calls by product line (renters, auto, commercial) and channel partner so commission
      and partner-contract spend can be charged back.
  - name: Optimization
    description: Cache rating reference data and quote artifacts within partner TOS; batch claim status
      polling to reduce call volume.
  - name: Accountability
    description: Assign a Liberty Mutual partner contract owner who reviews quote-to-bind ratios, claim
      volumes, and partner-contract performance monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
