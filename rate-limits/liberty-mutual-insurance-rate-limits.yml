specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Liberty Mutual Insurance
providerId: liberty-mutual-insurance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Casualty
  - Commercial Lines
  - Insurance
  - Personal Lines
  - Property
  - Renters
description: Liberty Mutual does not publish public API rate-limit documentation. Per-partner throttling
  and quota policies are configured at Liberty Mutual's API gateway and are governed by the partner agreement;
  sandbox vs production differences must be confirmed with the Liberty Mutual integration team.
notes: No public rate-limit documentation found. Numeric ceilings are partner-contract driven.
sources:
  - https://business.libertymutual.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner API Limit
    scope: api-key
    metric: varies
    limit: see partner agreement
    notes: Per-second / per-day ceilings are not published; refer to your partner contract.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor Retry-After when
      returned by the gateway.
  - name: Quote / Policy Bind Idempotency
    description: Use partner-issued idempotency keys for quote and bind requests to safely retry without
      double-binding policies.
maintainers:
